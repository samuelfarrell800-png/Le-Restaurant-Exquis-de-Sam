<span id="cartTotal">$0.00</span>
        </div>
        <button class="btn-apple-pay" onclick="openApplePay()">
             Pay
        </button>
    </div>
</div>

<div class="modal-overlay" id="applePayModal">
    <div class="apple-pay-sheet">
        <div class="sheet-header"> Apple Pay</div>
        <div class="sheet-row">
            <span>Merchant:</span>
            <strong>Le Restaurant Exquis de Sam</strong>
        </div>
        <div class="sheet-row">
            <span>Card:</span>
            <span>•••• 2026 (Co-Owner Pass)</span>
        </div>
        <div class="sheet-row sheet-total">
            <span>Total Due:</span>
            <span id="sheetDisplayTotal">$0.00</span>
        </div>
        <button class="btn-confirm-pay" onclick="completePayment()">Pay with Touch ID / Face ID</button>
        <button class="btn-cancel" onclick="closeApplePay()">Cancel</button>
    </div>
</div>

<script>
    let currentTotal = 0;
    let itemsInCart = [];

    function addToCart(name, price) {
        itemsInCart.push({name, price});
        currentTotal += price;
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const cartDiv = document.getElementById('cartItems');
        const totalSpan = document.getElementById('cartTotal');
        
        if(itemsInCart.length === 0) {
            cartDiv.innerHTML = "Your cart is empty.";
            totalSpan.innerText = "$0.00";
            return;
        }

        let html = "";
        itemsInCart.forEach(item => {
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${item.name}</span> <span>$${item.price.toFixed(2)}</span></div>`;
        });
        
        cartDiv.innerHTML = html;
        totalSpan.innerText = `$${currentTotal.toFixed(2)}`;
    }

    function openApplePay() {
        if(itemsInCart.length === 0) {
            alert("Add some exquisite items to your cart first!");
            return;
        }
        document.getElementById('sheetDisplayTotal').innerText = `$${currentTotal.toFixed(2)}`;
        document.getElementById('applePayModal').style.display = 'flex';
    }

    function closeApplePay() {
        document.getElementById('applePayModal').style.display = 'none';
    }

    function completePayment() {
        closeApplePay();
        alert("✨ Order Successfully Placed! ✨\n\nTotal charged to card: $0.00\n(100% S&J Executive Partner Discount Applied)\n\nYour order is heading straight to the kitchen!");
        itemsInCart = [];
        currentTotal = 0;
        updateCartDisplay();
    }
</script>

</body>
</html>
